<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<script>
(function(){
  var sw = window.screen.width;
  var vw = window.innerWidth;
  if (sw > 0 && vw > sw + 100) {
    var m = document.querySelector('meta[name=viewport]');
    if (m) m.content = 'width=' + sw + ',initial-scale=1.0,minimum-scale=1.0';
  }
})();
</script>
<title>Transizione Scale Modali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0d0d0d;
    --bg2:        #141414;
    --bg3:        #1c1c1c;
    --border:     #2a2a2a;
    --amber:      #f59e0b;
    --amber-dim:  #92600a;
    --amber-glow: rgba(245,158,11,0.15);
    --text:       #e5e5e5;
    --text-dim:   #6b6b6b;
    --text-mid:   #a0a0a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px clamp(16px, 4vw, 32px);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    color: var(--amber);
    text-shadow: 0 0 20px rgba(245,158,11,0.35);
    white-space: nowrap;
  }

  .back-link {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 1px;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    transition: color .2s, border-color .2s;
  }
  .back-link:hover { color: var(--amber); border-color: var(--amber-dim); }

  /* ── MAIN ── */
  main {
    padding: clamp(16px, 4vw, 32px);
  }

  .intro {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    line-height: 1.8;
    margin-bottom: 28px;
    max-width: 640px;
  }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-mid);
  }

  .legend-swatch {
    width: 30px;
    height: 30px;
    border-radius: 5px;
    border: 1px solid;
    flex-shrink: 0;
  }
  .swatch-root    { background: var(--amber-glow);        border-color: var(--amber-dim); }
  .swatch-normal  { background: var(--bg3);               border-color: var(--border); }
  .swatch-changed { background: rgba(245,158,11,0.2);     border-color: var(--amber);
                    box-shadow: 0 0 8px rgba(245,158,11,0.4); }

  /* ── SCHEMA WRAPPER ── */
  .schema-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .schema-wrapper::-webkit-scrollbar { height: 6px; }
  .schema-wrapper::-webkit-scrollbar-track { background: transparent; }
  .schema-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── SCHEMA (the grid) ── */
  #schema {
    position: relative;
    /* min-width set by JS */
  }

  /* ── HEADER ROW (semitone labels) ── */
  .header-row {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    margin-bottom: 2px;
  }

  .label-spacer {
    flex-shrink: 0;
    /* width set by JS / CSS var */
  }

  .st-header {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .st-num {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
  }

  .st-note {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-mid);
  }

  /* ── MODE ROW ── */
  .mode-row {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .mode-row:last-child { border-bottom: none; }

  .mode-label {
    flex-shrink: 0;
    padding: 12px 14px 12px 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }

  .mode-name {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text);
  }

  .mode-alts {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* ── NOTE CELL ── */
  .note-cell {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .note-block {
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    border: 1px solid;
    letter-spacing: 0;
    transition: box-shadow .2s;
  }

  .note-block.root {
    background: var(--amber-glow);
    border-color: var(--amber-dim);
    color: var(--amber);
  }

  .note-block.normal {
    background: var(--bg3);
    border-color: var(--border);
    color: var(--text-mid);
  }

  .note-block.changed {
    background: rgba(245,158,11,0.2);
    border-color: var(--amber);
    color: var(--amber);
    box-shadow: 0 0 12px rgba(245,158,11,0.4);
  }

  /* ── SVG ARROWS ── */
  #arrows-svg {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    overflow: visible;
  }
</style>
</head>
<body>

<header>
  <span class="page-title">TRANSIZIONE MODALE</span>
  <a class="back-link" href="index.html">← HOME</a>
</header>

<main>
  <p class="intro">
    Da LIDIA a LOCRIA: ad ogni passo una sola nota si abbassa di un semitono,<br>
    spostandosi di una colonna verso sinistra nella griglia cromatica.
  </p>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch swatch-root"></div>
      <span>tonica (1)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-normal"></div>
      <span>nota stabile</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch swatch-changed"></div>
      <span>nota abbassata ← rispetto alla scala precedente</span>
    </div>
  </div>

  <div class="schema-wrapper">
    <div id="schema"></div>
  </div>
</main>

<script>
'use strict';

/* ── DATA ─────────────────────────────────────────────────────────────── */

const SEMITONE_NAMES = ['C','C#/Db','D','D#/Eb','E','F','F#/Gb','G','G#/Ab','A','A#/Bb','B'];
const SEMITONE_SHORT = ['C','Db','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

/* Semitoni rispetto alla tonica (in Do: C=0) */
const modes = [
  {
    name: 'LIDIA',
    alts: '#4',
    notes: [
      { degree: '1',  semitone: 0,  kind: 'root' },
      { degree: '2',  semitone: 2,  kind: 'normal' },
      { degree: '3',  semitone: 4,  kind: 'normal' },
      { degree: '#4', semitone: 6,  kind: 'normal' },
      { degree: '5',  semitone: 7,  kind: 'normal' },
      { degree: '6',  semitone: 9,  kind: 'normal' },
      { degree: '7',  semitone: 11, kind: 'normal' },
    ]
  },
  {
    name: 'IONICA',
    alts: '—',
    notes: [
      { degree: '1',  semitone: 0,  kind: 'root' },
      { degree: '2',  semitone: 2,  kind: 'normal' },
      { degree: '3',  semitone: 4,  kind: 'normal' },
      { degree: '4',  semitone: 5,  kind: 'changed' },   // ← era #4 (st 6)
      { degree: '5',  semitone: 7,  kind: 'normal' },
      { degree: '6',  semitone: 9,  kind: 'normal' },
      { degree: '7',  semitone: 11, kind: 'normal' },
    ]
  },
  {
    name: 'MISOLIDIA',
    alts: 'b7',
    notes: [
      { degree: '1',  semitone: 0,  kind: 'root' },
      { degree: '2',  semitone: 2,  kind: 'normal' },
      { degree: '3',  semitone: 4,  kind: 'normal' },
      { degree: '4',  semitone: 5,  kind: 'normal' },
      { degree: '5',  semitone: 7,  kind: 'normal' },
      { degree: '6',  semitone: 9,  kind: 'normal' },
      { degree: 'b7', semitone: 10, kind: 'changed' },   // ← era 7 (st 11)
    ]
  },
  {
    name: 'DORICA',
    alts: 'b3, b7',
    notes: [
      { degree: '1',  semitone: 0,  kind: 'root' },
      { degree: '2',  semitone: 2,  kind: 'normal' },
      { degree: 'b3', semitone: 3,  kind: 'changed' },   // ← era 3 (st 4)
      { degree: '4',  semitone: 5,  kind: 'normal' },
      { degree: '5',  semitone: 7,  kind: 'normal' },
      { degree: '6',  semitone: 9,  kind: 'normal' },
      { degree: 'b7', semitone: 10, kind: 'normal' },
    ]
  },
  {
    name: 'EOLIA',
    alts: 'b3, b6, b7',
    notes: [
      { degree: '1',  semitone: 0,  kind: 'root' },
      { degree: '2',  semitone: 2,  kind: 'normal' },
      { degree: 'b3', semitone: 3,  kind: 'normal' },
      { degree: '4',  semitone: 5,  kind: 'normal' },
      { degree: '5',  semitone: 7,  kind: 'normal' },
      { degree: 'b6', semitone: 8,  kind: 'changed' },   // ← era 6 (st 9)
      { degree: 'b7', semitone: 10, kind: 'normal' },
    ]
  },
  {
    name: 'FRIGIA',
    alts: 'b2, b3, b6, b7',
    notes: [
      { degree: '1',  semitone: 0,  kind: 'root' },
      { degree: 'b2', semitone: 1,  kind: 'changed' },   // ← era 2 (st 2)
      { degree: 'b3', semitone: 3,  kind: 'normal' },
      { degree: '4',  semitone: 5,  kind: 'normal' },
      { degree: '5',  semitone: 7,  kind: 'normal' },
      { degree: 'b6', semitone: 8,  kind: 'normal' },
      { degree: 'b7', semitone: 10, kind: 'normal' },
    ]
  },
  {
    name: 'LOCRIA',
    alts: 'b2, b3, b5, b6, b7',
    notes: [
      { degree: '1',  semitone: 0,  kind: 'root' },
      { degree: 'b2', semitone: 1,  kind: 'normal' },
      { degree: 'b3', semitone: 3,  kind: 'normal' },
      { degree: '4',  semitone: 5,  kind: 'normal' },
      { degree: 'b5', semitone: 6,  kind: 'changed' },   // ← era 5 (st 7)
      { degree: 'b6', semitone: 8,  kind: 'normal' },
      { degree: 'b7', semitone: 10, kind: 'normal' },
    ]
  },
];

/* ── LAYOUT CONSTANTS ──────────────────────────────────────────────────── */

const N_ST      = 12;   // semitone columns
const LABEL_W   = 158;  // px – label column width
const ST_W      = 52;   // px – each semitone column width
const ROW_H     = 76;   // px – mode row height
const BLOCK_W   = 40;   // px – note block width
const BLOCK_H   = 40;   // px – note block height
const BLOCK_FS  = 11;   // px – note block font size

/* ── BUILD DOM ─────────────────────────────────────────────────────────── */

const schema = document.getElementById('schema');
const totalW  = LABEL_W + N_ST * ST_W;
schema.style.minWidth = totalW + 'px';

/* Apply CSS vars so note cells are sized consistently */
schema.style.setProperty('--st-w',   ST_W   + 'px');
schema.style.setProperty('--row-h',  ROW_H  + 'px');
schema.style.setProperty('--blk-w',  BLOCK_W + 'px');
schema.style.setProperty('--blk-h',  BLOCK_H + 'px');
schema.style.setProperty('--blk-fs', BLOCK_FS + 'px');
schema.style.setProperty('--lbl-w',  LABEL_W + 'px');

/* Override sizes with CSS vars in sheet */
const styleEl = document.createElement('style');
styleEl.textContent = `
  .label-spacer, .mode-label { width: var(--lbl-w); }
  .st-header, .note-cell     { width: var(--st-w); }
  .mode-row, .note-cell      { height: var(--row-h); }
  .note-block {
    width: var(--blk-w);
    height: var(--blk-h);
    font-size: var(--blk-fs);
  }
`;
document.head.appendChild(styleEl);

/* ─── Header row ───────────────────────────────────────────────────────── */
const headerRow = document.createElement('div');
headerRow.className = 'header-row';
schema.appendChild(headerRow);

const spacer = document.createElement('div');
spacer.className = 'label-spacer';
headerRow.appendChild(spacer);

for (let s = 0; s < N_ST; s++) {
  const h = document.createElement('div');
  h.className = 'st-header';
  h.innerHTML =
    `<span class="st-num">${s}</span>` +
    `<span class="st-note">${SEMITONE_SHORT[s]}</span>`;
  headerRow.appendChild(h);
}

/* ─── Mode rows ─────────────────────────────────────────────────────────── */
/* cellRefs[modeIdx][semitone] → DOM element (the .note-cell div) */
const cellRefs = [];

modes.forEach((mode, mi) => {
  const noteMap = {};
  mode.notes.forEach(n => { noteMap[n.semitone] = n; });

  const row = document.createElement('div');
  row.className = 'mode-row';
  schema.appendChild(row);

  /* Label */
  const lbl = document.createElement('div');
  lbl.className = 'mode-label';
  lbl.innerHTML =
    `<div class="mode-name">${mode.name}</div>` +
    `<div class="mode-alts">${mode.alts}</div>`;
  row.appendChild(lbl);

  const rowCells = {};

  for (let s = 0; s < N_ST; s++) {
    const cell = document.createElement('div');
    cell.className = 'note-cell';

    const note = noteMap[s];
    if (note) {
      const blk = document.createElement('div');
      blk.className = 'note-block ' + note.kind;
      blk.textContent = note.degree;
      cell.appendChild(blk);
    }

    row.appendChild(cell);
    rowCells[s] = cell;
  }

  cellRefs.push(rowCells);
});

/* ── DRAW SVG ARROWS ────────────────────────────────────────────────────── */

function drawArrows() {
  const existing = document.getElementById('arrows-svg');
  if (existing) existing.remove();

  const sw = schema.offsetWidth;
  const sh = schema.offsetHeight;

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'arrows-svg';
  svg.setAttribute('width',  sw);
  svg.setAttribute('height', sh);

  /* Arrowhead marker */
  svg.innerHTML = `
    <defs>
      <marker id="ah" markerWidth="7" markerHeight="5"
              refX="5.5" refY="2.5" orient="auto">
        <polygon points="0 0, 7 2.5, 0 5"
                 fill="rgba(245,158,11,0.85)"/>
      </marker>
    </defs>`;

  const sr = schema.getBoundingClientRect();

  modes.forEach((mode, mi) => {
    if (mi === 0) return;

    const changed = mode.notes.find(n => n.kind === 'changed');
    if (!changed) return;

    /* previous semitone = current + 1 (the note moved one step left) */
    const prevSt = changed.semitone + 1;

    const fromCell = cellRefs[mi - 1][prevSt];
    const toCell   = cellRefs[mi][changed.semitone];
    if (!fromCell || !toCell) return;

    const fr = fromCell.getBoundingClientRect();
    const tr = toCell.getBoundingClientRect();

    /* centres, relative to schema */
    const x1 = fr.left - sr.left + fr.width  / 2;
    const y1 = fr.bottom - sr.top  - 4;         // bottom of "from" cell, slight inset
    const x2 = tr.left  - sr.left + tr.width  / 2;
    const y2 = tr.top   - sr.top  + 6;          // top of "to" cell, slight inset

    /* Cubic bezier – curves toward the left side matching the shift */
    const midY = (y1 + y2) / 2;
    const dx   = x2 - x1;   // negative (moving left)

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d',
      `M ${x1} ${y1} ` +
      `C ${x1 + dx * 0.2} ${midY}, ` +
        `${x2 - dx * 0.1} ${midY}, ` +
        `${x2} ${y2}`
    );
    path.setAttribute('stroke', 'rgba(245,158,11,0.6)');
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-dasharray', '5 3');
    path.setAttribute('marker-end', 'url(#ah)');
    svg.appendChild(path);
  });

  schema.appendChild(svg);
}

window.addEventListener('load',   drawArrows);
window.addEventListener('resize', drawArrows);
</script>
</body>
</html>
